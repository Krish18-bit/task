<!DOCTYPE html>
<html lang="en">
<head>
    <title>my html page</title>
    
</head> 
<body>
    <h1>form inn html</h1>
    <form action ="data" method="post">
        <div>
            <label for = "name">Name</label>
            <input id="name" type="text" placeholder="name" >
        </div>
        <div>
            <label for = "email">Email</label>
            <input id="email" type="email" placeholder="enter email" required >
        </div>
        <div>
            <label for = "ph">phone</label>
            <input id="ph" type="tel" placeholder="number" required>
        </div>
        <div>
            <label for = "pass">password</label>
            <input id="pass" type="password" placeholder="enter password" required>
        </div>
        <div>
            <label for = "gen">Gender</label>
            <select id ="gen" required>
                <option value="" disabled selected>select gender</option>
               <option value="male">male</option>
               <option value="female">female</option> 
               <option value="other">other</option>
            </select> 
        </div>
        <div>
            <label for = "dt">Date</label>
            <input id="dt" type="date" placeholder="" required >
        </div>
        <div>
            <p>select year of pursuing</p>
            <label for = "1">1st</label>
            <input id="1" type="radio" name ="year" value="1st">
            <label for = "2">second</label>
            <input id="2" type="radio" name ="year" value="second">
            <label for = "3">third</label>
            <input id="3" type="radio" name ="year" value="third">
            <label for = "4">fourth</label>
            <input id="4" type="radio" name ="year" value="fourth">
        </div>

        <div>
            <label for ="comment">comments</label>
            <textarea id ="comment" placeholder="place right your thought about my form"   ></textarea>
        </div>
        <div>
            <button type="submit">Submit</button>

        </div>
    </form> 
</body> 
</html>
